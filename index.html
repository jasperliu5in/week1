<body id="dark">
    <button id="color-mode" onclick="ChangeColors();">
        light mode
    </button>
    <button onclick="HowAreYou();">
        How are you?
    </button>

    <script>
        const colorModeButton = document.querySelector('#color-mode')


        function ChangeColors() {
            if (document.body.id === "dark") {
                document.body.id = 'light';
                colorModeButton.textContent = 'Dark mode';
            } else {
                document.body.id = 'dark';
                colorModeButton.textContent = 'light mode';
            }
        }
        function HowAreYou() {
            let feelings = prompt("How are you feeling");
            respond(feelings);
        }

        function respond(mood) {
            if (mood === "sleepy") {
                alert('WAKE UP');
            } else {
                alert("Oh! You are Feeling " + mood + ".");
            }
        }

        console.log("mood", typeof mood);
        console.log("hi");

            console.log(typeof insideIf)
        }

    </script>
